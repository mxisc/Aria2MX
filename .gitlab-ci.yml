image: golang:1.23-bookworm

stages:
  - build
  - package
  - release

variables:
  CGO_ENABLED: "0"
  GOCACHE: "$CI_PROJECT_DIR/.cache/go-build"
  GOMODCACHE: "$CI_PROJECT_DIR/.cache/go/pkg/mod"
  PNPM_VERSION: "10.14.0"

build:allinone:
  stage: build
  parallel:
    matrix:
      - GOOS: linux
        GOARCH: amd64
        RUNTIME_TARGET: linux-amd64
      - GOOS: linux
        GOARCH: arm64
        RUNTIME_TARGET: linux-arm64
      - GOOS: darwin
        GOARCH: arm64
        RUNTIME_TARGET: darwin-arm64
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends nodejs npm libarchive-tools ca-certificates
    - npm install -g "pnpm@$PNPM_VERSION"
    - pnpm install --frozen-lockfile
  script:
    - pnpm run build
    - node scripts/prepare-aria2-runtime.mjs "$RUNTIME_TARGET"
    - mkdir -p dist/release
    - PANEL_VERSION="${CI_COMMIT_TAG:-1.0.0}"
    - GOOS="$GOOS" GOARCH="$GOARCH" go build -trimpath -tags allinone -ldflags "-X aria2mx/internal/version.PanelVersion=${PANEL_VERSION}" -o "dist/release/aria2mx-${GOOS}-${GOARCH}" ./cmd/aria2mx
  artifacts:
    name: "aria2mx-${GOOS}-${GOARCH}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - dist/release/aria2mx-${GOOS}-${GOARCH}
    expire_in: 7 days

upload:package:
  stage: package
  image: curlimages/curl:8.10.1
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - job: "build:allinone: [linux, amd64, linux-amd64]"
      artifacts: true
    - job: "build:allinone: [linux, arm64, linux-arm64]"
      artifacts: true
    - job: "build:allinone: [darwin, arm64, darwin-arm64]"
      artifacts: true
  script:
    - |
      for target in linux-amd64 linux-arm64 darwin-arm64; do
        file="aria2mx-${target}"
        url="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/aria2mx/${CI_COMMIT_TAG}/${file}"
        curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "dist/release/${file}" "${url}"
      done

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Creating GitLab release for ${CI_COMMIT_TAG}"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "Aria2MX $CI_COMMIT_TAG"
    description: "Release for $CI_COMMIT_TAG built from $CI_COMMIT_SHA. Assets are stored in the GitLab Generic Package Registry."
    assets:
      links:
        - name: "aria2mx-linux-amd64"
          url: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/aria2mx/$CI_COMMIT_TAG/aria2mx-linux-amd64"
        - name: "aria2mx-linux-arm64"
          url: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/aria2mx/$CI_COMMIT_TAG/aria2mx-linux-arm64"
        - name: "aria2mx-darwin-arm64"
          url: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/aria2mx/$CI_COMMIT_TAG/aria2mx-darwin-arm64"
