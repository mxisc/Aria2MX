image: golang:1.23-bookworm

stages:
  - build
  - release

variables:
  CGO_ENABLED: "0"
  GOCACHE: "$CI_PROJECT_DIR/.cache/go-build"
  GOMODCACHE: "$CI_PROJECT_DIR/.cache/go/pkg/mod"
  PNPM_VERSION: "10.14.0"

build:allinone:
  stage: build
  parallel:
    matrix:
      - GOOS: linux
        GOARCH: amd64
        RUNTIME_TARGET: linux-amd64
      - GOOS: linux
        GOARCH: arm64
        RUNTIME_TARGET: linux-arm64
      - GOOS: darwin
        GOARCH: arm64
        RUNTIME_TARGET: darwin-arm64
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends nodejs npm libarchive-tools ca-certificates
    - npm install -g "pnpm@$PNPM_VERSION"
    - pnpm install --frozen-lockfile
  script:
    - pnpm run build
    - node scripts/prepare-aria2-runtime.mjs "$RUNTIME_TARGET"
    - mkdir -p dist/release
    - GOOS="$GOOS" GOARCH="$GOARCH" go build -trimpath -tags allinone -o "dist/release/aria2mx-${GOOS}-${GOARCH}" ./cmd/aria2mx
  artifacts:
    name: "aria2mx-${GOOS}-${GOARCH}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - dist/release/aria2mx-${GOOS}-${GOARCH}
    expire_in: 7 days

release:test:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Creating GitLab release for ${CI_COMMIT_TAG}"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "Aria2MX $CI_COMMIT_TAG"
    description: "Test release for $CI_COMMIT_TAG built from $CI_COMMIT_SHA. CI artifacts expire after 7 days."
    assets:
      links:
        - name: "aria2mx-linux-amd64"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/download?job=build:allinone:%20[linux,%20amd64,%20linux-amd64]"
        - name: "aria2mx-linux-arm64"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/download?job=build:allinone:%20[linux,%20arm64,%20linux-arm64]"
        - name: "aria2mx-darwin-arm64"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/download?job=build:allinone:%20[darwin,%20arm64,%20darwin-arm64]"
