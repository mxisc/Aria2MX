name: Mirror from GitLab

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror GitLab refs to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone --mirror https://gitlab.com/mxisc/aria2mx.git repo.git
          cd repo.git
          git remote set-url --push origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --prune origin "+refs/heads/*:refs/heads/*" "+refs/tags/*:refs/tags/*"
